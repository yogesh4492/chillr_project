{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Chillr</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'myapp/css/login.css' %}">
</head>
<body>
<div class="auth-layout">

  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <div class="auth-left-orb"></div>
    <div class="auth-logo">
      <div class="auth-logo-icon">🔥</div>
      <span class="auth-logo-text">Chillr</span>
    </div>
    <div class="auth-left-content">
      <h1 class="auth-tagline">Share moments<br>that <span>matter</span></h1>
      <p class="auth-sub">Connect with your people, share what you love, and discover stories from around the world.</p>
      <div class="auth-dots">
        <div class="auth-dot active"></div>
        <div class="auth-dot"></div>
        <div class="auth-dot"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-card">

      {% if e_msg %}
      <div class="alert-error">
        <span class="alert-icon">⚠</span>
        <span>{{ e_msg }}</span>
      </div>
      {% endif %}

      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-subheading">Login to continue your vibe</p>

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="auth-input" type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="auth-input" type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="auth-btn">Sign in</button>
      </form>

      <div class="auth-divider">or</div>

      <button class="google-btn">
        <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.174 0 7.548 0 9s.348 2.826.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-footer">New here? <a href="{% url 'signup' %}">Create account →</a></p>
    </div>
  </div>
</div>
</body>
</html>
