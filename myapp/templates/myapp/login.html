{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chillr — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep:    #080b14;
            --bg-card:    rgba(14, 18, 32, 0.72);
            --border:     rgba(255,255,255,0.08);
            --accent:     #f5a623;
            --accent-dim: rgba(245,166,35,0.18);
            --text-main:  #e8eaf6;
            --text-muted: rgba(232,234,246,0.48);
            --blob-a:     #1a2a5e;
            --blob-b:     #3d1a6e;
            --blob-c:     #1a4a3a;
            --error-bg:   rgba(220,60,60,0.12);
            --error-txt:  #ff8080;
        }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Animated blobs ── */
        .blobs {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .blob-1 { width: 600px; height: 600px; background: var(--blob-a); top: -140px; left: -160px; animation-duration: 20s; }
        .blob-2 { width: 480px; height: 480px; background: var(--blob-b); bottom: -100px; right: -100px; animation-duration: 16s; animation-delay: -5s; }
        .blob-3 { width: 340px; height: 340px; background: var(--blob-c); top: 40%; left: 40%; animation-duration: 22s; animation-delay: -9s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.06); }
        }

        /* ── Layout ── */
        .shell {
            position: relative; z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: min(960px, 96vw);
            min-height: 560px;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 32px 80px rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }

        /* ── Left panel ── */
        .left {
            background: linear-gradient(145deg, #0d1528 0%, #10182e 60%, #0f1f1a 100%);
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .left::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.022'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .brand { position: relative; }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 14px;
        }
        .brand-sub {
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .brand-dots { display: flex; gap: 6px; margin-top: 36px; }
        .brand-dots span {
            display: block; width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); opacity: 0.25;
        }
        .brand-dots span:nth-child(2) { opacity: 0.55; width: 24px; border-radius: 4px; }
        .brand-dots span:nth-child(3) { opacity: 0.9; }

        .left-footer {
            position: relative;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ── Right / card ── */
        .right {
            background: var(--bg-card);
            backdrop-filter: blur(28px);
            padding: 52px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid var(--border);
        }

        .card-header { margin-bottom: 32px; }
        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }
        .card-sub { font-size: 0.875rem; color: var(--text-muted); font-weight: 300; }

        /* ── Error alert ── */
        .alert-error {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--error-bg);
            border: 1px solid rgba(255,100,100,0.25);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 22px;
            font-size: 0.84rem;
            color: var(--error-txt);
        }
        .alert-icon {
            width: 18px; height: 18px; flex-shrink: 0;
            border-radius: 50%; background: rgba(220,60,60,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: #fff;
        }

        /* ── Form ── */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-group input::placeholder { color: rgba(232,234,246,0.25); }
        .form-group input:focus {
            border-color: rgba(245,166,35,0.5);
            background: rgba(245,166,35,0.04);
        }

        /* ── Buttons ── */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a0e00;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.3px;
            transition: opacity 0.15s, transform 0.15s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); opacity: 1; }

        .divider {
            display: flex; align-items: center; gap: 14px;
            margin: 22px 0;
            font-size: 0.78rem; color: var(--text-muted); letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .btn-google {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-main);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-google:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); }
        .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

        .footer-links {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .footer-links a:hover { opacity: 0.75; }

        /* ── Mobile ── */
        @media (max-width: 680px) {
            .shell { grid-template-columns: 1fr; min-height: auto; }
            .left { padding: 40px 32px 32px; min-height: 180px; }
            .brand-name { font-size: 2.2rem; }
            .left-footer { display: none; }
            .right { padding: 36px 28px 44px; border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="shell">

        <!-- LEFT PANEL -->
        <div class="left">
            <div class="brand">
                <div class="brand-name">Chillr</div>
                <div class="brand-sub">Connect &bull; Share &bull; Chill</div>
                <div class="brand-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div class="left-footer">
                &copy; 2025 Chillr &mdash; All rights reserved
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right">

            {% if e_msg %}
            <div class="alert-error">
                <div class="alert-icon">!</div>
                <span>{{ e_msg }}</span>
            </div>
            {% endif %}

            <div class="card-header">
                <div class="card-title">Welcome back</div>
                <div class="card-sub">Login to continue your vibe</div>
            </div>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                </div>

                <input type="submit" class="btn-login" value="Login">
            </form>

            <div class="divider">OR</div>

            <button class="btn-google" type="button">
                <!-- Google "G" icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <div class="footer-links">
                <span>New here? <a href="{% url 'signup' %}">Create Account</a></span>
                <a href="{% url 'forgot_password' %}">Forgot Password</a>
            </div>

        </div>
    </div>

</body>
</html>
